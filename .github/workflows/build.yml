name: Flutter Build & Release

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: client

      - name: Build Windows
        run: flutter build windows --release
        working-directory: client

      - name: Create Windows distribution
        run: |
          cd client\build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath "$env:GITHUB_WORKSPACE\rainbow_cloud_windows.zip" -Force
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow_cloud_windows
          path: rainbow_cloud_windows.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: client

      - name: Build APK
        run: flutter build apk --release
        working-directory: client

      - name: Build App Bundle
        run: flutter build appbundle --release
        working-directory: client

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow_cloud_android_apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow_cloud_android_aab
          path: client/build/app/outputs/bundle/release/app-release.aab

  create-release:
    name: Create GitHub Release
    needs: [build-windows]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rainbow_cloud_windows

      - name: Download Android APK
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: rainbow_cloud_android_apk

      - name: Download Android AAB
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: rainbow_cloud_android_aab

      - name: Generate version tag
        id: version
        run: |
          DATETIME=$(TZ='Asia/Shanghai' date +'%Y%m%d-%H%M')
          echo "tag=v${DATETIME}" >> $GITHUB_OUTPUT
          echo "name=v${DATETIME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            rainbow_cloud_windows.zip
            *.apk
            *.aab
