name: Flutter Build CI

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: client

      - name: Build Windows
        run: flutter build windows --release
        working-directory: client

      - name: Create Windows distribution
        run: |
          cd client\build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath "$env:GITHUB_WORKSPACE\rainbow_cloud_windows.zip" -Force
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow_cloud_windows
          path: rainbow_cloud_windows.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: client

      - name: Build APK
        run: flutter build apk --release
        working-directory: client

      - name: Build App Bundle
        run: flutter build appbundle --release
        working-directory: client

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow_cloud_android_apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow_cloud_android_aab
          path: client/build/app/outputs/bundle/release/app-release.aab

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: client

      - name: Enable Web
        run: flutter config --enable-web
        working-directory: client

      - name: Build Web
        run: flutter build web --release
        working-directory: client

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow_cloud_web
          path: client/build/web
