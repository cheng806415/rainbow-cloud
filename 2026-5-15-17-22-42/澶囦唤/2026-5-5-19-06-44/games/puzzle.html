<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>数字华容道</title>
<style>
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "Microsoft YaHei",sans-serif; }
#wrap { text-align: center; color: #eee; }
#info { margin-bottom: 15px; font-size: 16px; color: #aaa; }
#step { color: #e94560; font-weight: bold; }
canvas { display: block; margin: 0 auto; border-radius: 10px; }
button { background: #e94560; color: #fff; border: none; padding: 10px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 15px; }
button:hover { background: #c73e54; }
</style>
</head>
<body>
<div id="wrap">
<div id="info">步数: <span id="step">0</span> &nbsp; <span id="time">0秒</span></div>
<canvas id="c"></canvas>
<button onclick="init()">重新开始</button>
</div>
<script>
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var size=80,gap=6;
canvas.width=4*size+5*gap;
canvas.height=4*size+5*gap;
var board,steps,emptyX,emptyY,timer,seconds;
function init(){
    board=[];
    for(var i=0;i<4;i++){
        board[i]=[];
        for(var j=0;j<4;j++)board[i][j]=i*4+j+1;
    }
    board[3][3]=0;
    emptyX=3;emptyY=3;
    steps=0;seconds=0;
    if(timer)clearInterval(timer);
    timer=setInterval(function(){seconds++;document.getElementById('time').textContent=seconds+'秒';},1000);
    document.getElementById('step').textContent='0';
    document.getElementById('time').textContent='0秒';
    shuffle();
    draw();
}
function shuffle(){
    for(var k=0;k<200;k++){
        var dirs=[];
        if(emptyX>0)dirs.push({x:-1,y:0});
        if(emptyX<3)dirs.push({x:1,y:0});
        if(emptyY>0)dirs.push({x:0,y:-1});
        if(emptyY<3)dirs.push({x:0,y:1});
        var d=dirs[Math.floor(Math.random()*dirs.length)];
        var tx=emptyX+d.x,ty=emptyY+d.y;
        board[emptyY][emptyX]=board[ty][tx];
        board[ty][tx]=0;
        emptyX=tx;emptyY=ty;
    }
    steps=0;
    document.getElementById('step').textContent='0';
}
function draw(){
    ctx.fillStyle='#16213e';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(var y=0;y<4;y++)for(var x=0;x<4;x++){
        var v=board[y][x];
        var px=gap+x*(size+gap),py=gap+y*(size+gap);
        if(v===0)continue;
        ctx.fillStyle='#0f3460';
        ctx.beginPath();ctx.roundRect(px,py,size,size,8);ctx.fill();
        ctx.fillStyle='#e94560';
        ctx.font='bold 32px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(v,px+size/2,py+size/2);
    }
}
function move(x,y){
    if(x<0||x>3||y<0||y>3)return;
    if(board[y][x]===0)return;
    if((x===emptyX&&Math.abs(y-emptyY)===1)||(y===emptyY&&Math.abs(x-emptyX)===1)){
        board[emptyY][emptyX]=board[y][x];
        board[y][x]=0;
        emptyX=x;emptyY=y;
        steps++;
        document.getElementById('step').textContent=steps;
        draw();
        if(isWin()){
            clearInterval(timer);
            setTimeout(function(){alert('恭喜！用时'+seconds+'秒，步数'+steps);},100);
        }
    }
}
function isWin(){
    for(var y=0;y<4;y++)for(var x=0;x<4;x++){
        var v=board[y][x];
        var expect=y*4+x+1;
        if(expect===16)expect=0;
        if(v!==expect)return false;
    }
    return true;
}
canvas.addEventListener('click',function(e){
    var rect=canvas.getBoundingClientRect();
    var x=Math.floor((e.clientX-rect.left)/((rect.width/4)));
    var y=Math.floor((e.clientY-rect.top)/((rect.height/4)));
    move(x,y);
});
document.addEventListener('keydown',function(e){
    if(e.key==='ArrowUp')move(emptyX,emptyY-1);
    else if(e.key==='ArrowDown')move(emptyX,emptyY+1);
    else if(e.key==='ArrowLeft')move(emptyX-1,emptyY);
    else if(e.key==='ArrowRight')move(emptyX+1,emptyY);
});
init();
</script>
</body>
</html>
