<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>贪吃蛇</title>
<style>
body { background: #111; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { display: block; }
#ui { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 12px 16px; border-radius: 10px; color: #fff; font-family: monospace; font-size: 13px; min-width: 220px; }
#ui label { display: block; margin: 6px 0; }
#ui input[type=range] { width: 120px; vertical-align: middle; }
#ui input[type=color] { width: 36px; height: 22px; border: none; cursor: pointer; vertical-align: middle; }
#score { position: fixed; top: 10px; right: 20px; color: #fff; font-size: 28px; font-family: monospace; z-index: 10; }
#over { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 20; }
#over h2 { color: #f00; font-size: 48px; margin-bottom: 10px; }
#over p { color: #fff; font-size: 24px; margin-bottom: 20px; }
#over button { background: #e94560; color: #fff; border: none; padding: 12px 40px; font-size: 18px; border-radius: 8px; cursor: pointer; }
#over button:hover { background: #c73e54; }
#controls { position: fixed; bottom: 10px; left: 10px; color: #555; font-family: monospace; font-size: 12px; z-index: 10; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div>得分: <span id="scoreVal">0</span></div>
  <label>速度: <span id="speedVal">5</span> <input type="range" id="speed" min="1" max="10" value="5"></label>
  <label>蛇身颜色: <input type="color" id="snakeColor" value="#00ff00"></label>
  <label>食物颜色: <input type="color" id="foodColor" value="#ff0000"></label>
</div>
<div id="score">0</div>
<div id="over"><h2>游戏结束</h2><p>得分: <span id="finalScore">0</span></p><button onclick="init()">重新开始</button></div>
<div id="controls">WASD / 方向键控制 | 空格开始/暂停</div>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W=window.innerWidth,H=window.innerHeight;
var ratio=16/9;
if(W/H>ratio){canvas.width=Math.floor(H*ratio);canvas.height=H;}
else{canvas.width=W;canvas.height=Math.floor(W/ratio);}
canvas.style.marginLeft=(window.innerWidth-canvas.width)/2+'px';
canvas.style.marginTop=(window.innerHeight-canvas.height)/2+'px';

window.addEventListener('resize',function(){
    W=window.innerWidth;H=window.innerHeight;
    if(W/H>ratio){canvas.width=Math.floor(H*ratio);canvas.height=H;}
    else{canvas.width=W;canvas.height=Math.floor(W/ratio);}
    canvas.style.marginLeft=(window.innerWidth-canvas.width)/2+'px';
    canvas.style.marginTop=(window.innerHeight-canvas.height)/2+'px';
});

var R=20,COLS=320,ROWS=180;
var snake,dir,food,score,interval,over,paused,speed,started;
var camX=0,camY=0;

function placeFood(){
    do{
        food={x:snake[0].x+Math.floor(Math.random()*40)-20,y:snake[0].y+Math.floor(Math.random()*40)-20};
    }while(food.x<0||food.x>=COLS||food.y<0||food.y>=ROWS||snake.some(s=>s.x===food.x&&s.y===food.y));
}

function tick(){
    if(over||paused)return;
    var h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){
        over=true;
        clearInterval(interval);
        document.getElementById('finalScore').textContent=score;
        document.getElementById('over').style.display='flex';
        return;
    }
    snake.unshift(h);
    if(h.x===food.x&&h.y===food.y){
        score+=10;
        document.getElementById('scoreVal').textContent=score;
        document.getElementById('score').textContent=score;
        placeFood();
    }else{
        snake.pop();
    }
}

function draw(){
    ctx.fillStyle='#111';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    
    if(!started){
        ctx.fillStyle='#fff';
        ctx.font='bold 28px monospace';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('按空格开始游戏',canvas.width/2,canvas.height/2);
        requestAnimationFrame(draw);
        return;
    }
    
    var head=snake[0];
    var targetX=head.x*R-canvas.width/2+R/2;
    var targetY=head.y*R-canvas.height/2+R/2;
    camX+=(targetX-camX)*0.15;
    camY+=(targetY-camY)*0.15;
    
    var snakeColor=document.getElementById('snakeColor').value;
    var foodColor=document.getElementById('foodColor').value;
    
    ctx.save();
    ctx.translate(-camX,-camY);
    
    var startX=Math.floor(camX/R)-1;
    var endX=Math.ceil((camX+canvas.width)/R)+1;
    var startY=Math.floor(camY/R)-1;
    var endY=Math.ceil((camY+canvas.height)/R)+1;
    
    ctx.strokeStyle='#1a1a1a';
    ctx.lineWidth=0.5;
    for(var gx=startX;gx<=endX;gx++){
        ctx.beginPath();ctx.moveTo(gx*R,startY*R);ctx.lineTo(gx*R,endY*R);ctx.stroke();
    }
    for(var gy=startY;gy<=endY;gy++){
        ctx.beginPath();ctx.moveTo(startX*R,gy*R);ctx.lineTo(endX*R,gy*R);ctx.stroke();
    }
    
    for(var i=snake.length-1;i>=0;i--){
        var s=snake[i];
        var alpha=1-i/snake.length*0.6;
        ctx.fillStyle=i===0?'#ffffff':snakeColor;
        ctx.globalAlpha=alpha;
        ctx.fillRect(s.x*R+1,s.y*R+1,R-2,R-2);
    }
    ctx.globalAlpha=1;
    
    ctx.fillStyle=foodColor;
    ctx.beginPath();
    ctx.arc(food.x*R+R/2,food.y*R+R/2,R/2-1,0,Math.PI*2);
    ctx.fill();
    
    ctx.restore();
    requestAnimationFrame(draw);
}

function init(){
    snake=[{x:160,y:90},{x:159,y:90},{x:158,y:90}];
    dir={x:1,y:0};
    score=0;
    over=false;
    paused=false;
    started=true;
    speed=parseInt(document.getElementById('speed').value);
    document.getElementById('over').style.display='none';
    document.getElementById('scoreVal').textContent='0';
    document.getElementById('score').textContent='0';
    placeFood();
    if(interval)clearInterval(interval);
    interval=setInterval(tick,120-speed*10);
}

document.addEventListener('keydown',function(e){
    var k=e.key.toLowerCase();
    if(!started){
        if(k===' '){e.preventDefault();init();return;}
    }
    if(over)return;
    if((k==='w'||k==='arrowup')&&dir.y===0)dir={x:0,y:-1};
    else if((k==='s'||k==='arrowdown')&&dir.y===0)dir={x:0,y:1};
    else if((k==='a'||k==='arrowleft')&&dir.x===0)dir={x:-1,y:0};
    else if((k==='d'||k==='arrowright')&&dir.x===0)dir={x:1,y:0};
    else if(k===' '||k==='escape'){paused=!paused;if(!paused){clearInterval(interval);interval=setInterval(tick,120-speed*10);}}
    e.preventDefault();
});

document.getElementById('speed').addEventListener('input',function(){
    speed=parseInt(this.value);
    document.getElementById('speedVal').textContent=speed;
    if(started&&!over&&!paused){
        clearInterval(interval);
        interval=setInterval(tick,120-speed*10);
    }
});

draw();
</script>
</body>
</html>
