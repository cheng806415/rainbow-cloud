<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>太空射击</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#eee;font-family:"Microsoft YaHei",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;user-select:none}
h1{font-size:22px;margin-bottom:8px;color:#3498db}
#info{font-size:14px;color:#888;margin-bottom:12px}
canvas{background:#111;border:2px solid #333;border-radius:4px;display:block}
#msg{font-size:14px;color:#aaa;margin-top:10px;text-align:center}
#back{position:fixed;top:15px;left:15px;color:#aaa;text-decoration:none;font-size:14px}
#back:hover{color:#fff}
</style>
</head>
<body>
<a href="index.html" id="back">返回游戏列表</a>
<h1>太空射击</h1>
<div id="info">分数: <span id="score">0</span> | 生命: <span id="lives">3</span></div>
<canvas id="canvas" width="600" height="700"></canvas>
<div id="msg">方向键移动 | 空格射击 | 点击开始</div>
<script>
var c=document.getElementById('canvas'),x=c.getContext('2d'),W=c.width,H=c.height,scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),msg=document.getElementById('msg');
var ship={x:W/2,y:H-60,w:30,h:20,speed:6};
var bullets=[],enemies=[],particles=[],score=0,lives=3,running=false,keys={},spawnTimer=0,frame=0;
function shoot(){bullets.push({x:ship.x,y:ship.y-ship.h/2,spd:8})}
function spawnEnemy(){var e={x:Math.random()*(W-30)+15,y:-20,w:25,h:20,spd:1.5+Math.random()*2};enemies.push(e)}
function addParticle(ex,ey){for(var i=0;i<8;i++)particles.push({x:ex,y:ey,dx:(Math.random()-0.5)*4,dy:(Math.random()-0.5)*4,life:20})}
function update(){
if(!running){draw();return}
frame++;
if(keys.ArrowLeft||keys.a)ship.x-=ship.speed;
if(keys.ArrowRight||keys.d)ship.x+=ship.speed;
if(keys.ArrowUp||keys.w)ship.y-=ship.speed;
if(keys.ArrowDown||keys.s)ship.y+=ship.speed;
if(ship.x<15)ship.x=15;if(ship.x>W-15)ship.x=W-15;if(ship.y<15)ship.y=15;if(ship.y>H-15)ship.y=H-15;
if(frame%10===0)bullets.forEach(function(b){b.y-=b.spd});
bullets=bullets.filter(function(b){return b.y>-10});
if(frame%30===0)spawnEnemy();
enemies.forEach(function(e){e.y+=e.spd});
for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];for(var j=bullets.length-1;j>=0;j--){var b=bullets[j];if(Math.abs(e.x-b.x)<e.w/2+3&&Math.abs(e.y-b.y)<e.h/2+3){addParticle(e.x,e.y);enemies.splice(i,1);bullets.splice(j,1);score++;scoreEl.textContent=score;break}}}
enemies=enemies.filter(function(e){if(e.y>H+20){return false}if(Math.abs(e.x-ship.x)<(e.w+ship.w)/2&&Math.abs(e.y-ship.y)<(e.h+ship.h)/2){lives--;livesEl.textContent=lives;addParticle(ship.x,ship.y);if(lives<=0){running=false;msg.textContent='游戏结束！得分: '+score+' 点击重新开始'}return false}return true});
particles.forEach(function(p){p.x+=p.dx;p.y+=p.dy;p.life--});
particles=particles.filter(function(p){return p.life>0});
draw();requestAnimationFrame(update)}
function draw(){
x.clearRect(0,0,W,H);
x.fillStyle='#3498db';x.beginPath();x.moveTo(ship.x,ship.y-ship.h/2);x.lineTo(ship.x-ship.w/2,ship.y+ship.h/2);x.lineTo(ship.x+ship.w/2,ship.y+ship.h/2);x.closePath();x.fill();
bullets.forEach(function(b){x.fillStyle='#f1c40f';x.fillRect(b.x-2,b.y,4,10)});
enemies.forEach(function(e){x.fillStyle='#e74c3c';x.fillRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h)});
particles.forEach(function(p){x.fillStyle='rgba(231,76,60,'+p.life/20+')';x.fillRect(p.x-2,p.y-2,4,4)})}
document.addEventListener('keydown',function(e){keys[e.key]=true;if(e.key===' '&&running){e.preventDefault();shoot()}if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key)!==-1)e.preventDefault()});
document.addEventListener('keyup',function(e){keys[e.key]=false});
c.addEventListener('click',function(){if(!running){score=0;lives=3;enemies=[];bullets=[];particles=[];scoreEl.textContent=score;livesEl.textContent=lives;ship.x=W/2;ship.y=H-60;running=true;msg.textContent=''}});
draw();
</script>
</body>
</html>
