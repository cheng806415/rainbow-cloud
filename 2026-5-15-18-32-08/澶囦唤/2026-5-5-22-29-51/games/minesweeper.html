<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>扫雷</title>
<style>
body{background:#2c3e50;color:#fff;font-family:"Microsoft YaHei",sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;flex-direction:column}
h2{color:#e74c3c;margin-bottom:10px;letter-spacing:2px}
#info{margin-bottom:15px;font-size:14px;color:#aaa}
#info span{color:#e74c3c;font-weight:bold}
#grid{display:inline-grid;gap:2px;background:#34495e;padding:4px;border-radius:8px}
.cell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;cursor:pointer;border-radius:4px;background:#4a5568;user-select:none;transition:background 0.15s}
.cell:hover:not(.revealed){background:#5a6b7e}
.cell.revealed{background:#1a1a2e;cursor:default}
.cell.flagged{background:#5a6b7e}
.cell.mine{background:#e74c3c}
.c1{color:#3498db}.c2{color:#2ecc71}.c3{color:#e74c3c}.c4{color:#9b59b6}.c5{color:#e67e22}.c6{color:#1abc9c}.c7{color:#f39c12}.c8{color:#95a5a6}
#controls{margin-top:15px;display:flex;gap:10px;align-items:center}
button{background:#e74c3c;color:#fff;border:none;padding:10px 25px;border-radius:6px;cursor:pointer;font-size:14px;font-family:"Microsoft YaHei",sans-serif}
button:hover{background:#c0392b}
#msg{margin-top:15px;font-size:18px;min-height:30px}
</style>
</head>
<body>
<h2>扫雷</h2>
<div id="info">剩余雷数: <span id="flagCount">10</span> &nbsp; | &nbsp; 用时: <span id="timer">0</span>秒</div>
<div id="grid"></div>
<div id="controls">
  <button onclick="init(9,9,10)">简单</button>
  <button onclick="init(12,12,20)">中等</button>
  <button onclick="init(16,16,40)">困难</button>
</div>
<div id="msg"></div>
<script>
var ROWS=9,COLS=9,MINES=10,board,revealed,flagged,gameOver,timerVal,timerInt;
function init(r,c,m){
  ROWS=r;COLS=c;MINES=m;
  board=[];revealed=[];flagged=[];gameOver=false;
  timerVal=0;
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(function(){if(!gameOver)document.getElementById('timer').textContent=++timerVal;},1000);
  document.getElementById('timer').textContent='0';
  document.getElementById('flagCount').textContent=MINES;
  document.getElementById('msg').textContent='';
  for(var i=0;i<ROWS;i++){board[i]=[];revealed[i]=[];flagged[i]=[];for(var j=0;j<COLS;j++){board[i][j]=0;revealed[i][j]=false;flagged[i][j]=false;}}
  var placed=0;
  while(placed<MINES){var rr=Math.floor(Math.random()*ROWS),rc=Math.floor(Math.random()*COLS);if(board[rr][rc]!==-1){board[rr][rc]=-1;placed++;}}
  for(var i=0;i<ROWS;i++)for(var j=0;j<COLS;j++){if(board[i][j]===-1)continue;var cnt=0;for(var di=-1;di<=1;di++)for(var dj=-1;dj<=1;dj++){var ni=i+di,nj=j+dj;if(ni>=0&&ni<ROWS&&nj>=0&&nj<COLS&&board[ni][nj]===-1)cnt++;}board[i][j]=cnt;}
  drawGrid();
}
function drawGrid(){
  var g=document.getElementById('grid');
  g.style.gridTemplateColumns='repeat('+COLS+',36px)';
  g.innerHTML='';
  for(var i=0;i<ROWS;i++)for(var j=0;j<COLS;j++){
    var d=document.createElement('div');
    d.className='cell'+(revealed[i][j]?(board[i][j]===-1?' mine':' revealed'):flagged[i][j]?' flagged':'');
    if(revealed[i][j]&&board[i][j]===-1)d.textContent='*';
    else if(revealed[i][j]&&board[i][j]>0){d.textContent=board[i][j];d.className+=' c'+board[i][j];}
    else if(flagged[i][j]&&!revealed[i][j])d.textContent='F';
    d.dataset.r=i;d.dataset.c=j;
    d.onclick=function(){clickCell(+this.dataset.r,+this.dataset.c)};
    d.oncontextmenu=function(e){e.preventDefault();flagCell(+this.dataset.r,+this.dataset.c)};
    g.appendChild(d);
  }
}
function clickCell(r,c){
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(board[r][c]===-1){
    gameOver=true;clearInterval(timerInt);
    for(var i=0;i<ROWS;i++)for(var j=0;j<COLS;j++)if(board[i][j]===-1)revealed[i][j]=true;
    drawGrid();
    document.getElementById('msg').innerHTML='<span style="color:#e74c3c">游戏结束！踩到雷了</span>';
    return;
  }
  if(board[r][c]===0){
    for(var di=-1;di<=1;di++)for(var dj=-1;dj<=1;dj++){var ni=r+di,nj=c+dj;if(ni>=0&&ni<ROWS&&nj>=0&&nj<COLS&&!revealed[ni][nj])clickCell(ni,nj);}
  }
  drawGrid();
  checkWin();
}
function flagCell(r,c){
  if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  var fc=0;for(var i=0;i<ROWS;i++)for(var j=0;j<COLS;j++)if(flagged[i][j])fc++;
  document.getElementById('flagCount').textContent=MINES-fc;
  drawGrid();
}
function checkWin(){
  var unrevealed=0;
  for(var i=0;i<ROWS;i++)for(var j=0;j<COLS;j++)if(!revealed[i][j])unrevealed++;
  if(unrevealed===MINES){
    gameOver=true;clearInterval(timerInt);
    document.getElementById('msg').innerHTML='<span style="color:#2ecc71">恭喜通关！用时'+timerVal+'秒</span>';
  }
}
init(9,9,10);
</script>
</body>
</html>
