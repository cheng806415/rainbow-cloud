<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>弹球</title>
<style>
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
#wrap { text-align: center; color: #fff; }
#info { font-size: 18px; margin-bottom: 10px; color: #aaa; }
#info span { color: #e74c3c; font-weight: bold; }
canvas { display: block; margin: 0 auto; border-radius: 8px; }
#over { margin-top: 10px; font-size: 18px; color: #888; }
</style>
</head>
<body>
<div id="wrap">
<div id="info">分数: <span id="score">0</span> | 3条命</div>
<canvas id="c"></canvas>
<div id="over">鼠标移动挡板 | 点击发射</div>
</div>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=500;canvas.height=600;
var W=canvas.width,H=canvas.height;
var ball={x:0,y:0,r:7,dx:0,dy:0,spd:5,onPaddle:true};
var paddle={w:90,h:10,y:H-30,x:W/2-45};
var bumpers=[{x:150,y:200,r:30},{x:350,y:200,r:30},{x:250,y:300,r:30}];
var score=0,lives=3,alive=false;

function resetBall(){
    ball.onPaddle=true;
    ball.x=paddle.x+paddle.w/2;
    ball.y=paddle.y-ball.r-1;
    ball.dx=0;ball.dy=0;
}

function resetGame(){
    score=0;lives=3;
    document.getElementById('score').textContent=0;
    resetBall();
}

function launch(){
    if(ball.onPaddle){
        ball.onPaddle=false;
        ball.dx=(Math.random()-0.5)*3;
        ball.dy=-ball.spd;
        alive=true;
        document.getElementById('over').textContent='';
        loop();
    }
}

function update(){
    if(ball.onPaddle){
        ball.x=paddle.x+paddle.w/2;
        ball.y=paddle.y-ball.r-1;
        return;
    }
    ball.x+=ball.dx;ball.y+=ball.dy;
    if(ball.x-ball.r<0||ball.x+ball.r>W)ball.dx=-ball.dx;
    if(ball.y-ball.r<0)ball.dy=-ball.dy;
    if(ball.y+ball.r>paddle.y&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w&&ball.dy>0){
        ball.dy=-ball.dy;
        ball.dx+=(ball.x-(paddle.x+paddle.w/2))*0.1;
    }
    bumpers.forEach(function(b){
        var dx=ball.x-b.x,dy=ball.y-b.y;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<b.r+ball.r){
            ball.dx=(dx/d)*6;ball.dy=(dy/d)*6;
            score++;
            document.getElementById('score').textContent=score;
        }
    });
    if(ball.y>H+20){
        lives--;
        if(lives<=0){
            alive=false;
            document.getElementById('over').textContent='游戏结束！得分: '+score+' 点击重新开始';
            return;
        }
        resetBall();
        alive=false;
        document.getElementById('over').textContent='点击发射';
    }
}

function draw(){
    ctx.clearRect(0,0,W,H);
    bumpers.forEach(function(b){
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle='#e74c3c';ctx.fill();
        ctx.strokeStyle='#c0392b';ctx.lineWidth=2;ctx.stroke();
    });
    ctx.fillStyle='#eee';
    ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    ctx.fillStyle='#f1c40f';ctx.fill();ctx.closePath();
}

function loop(){
    if(!alive){draw();return;}
    update();draw();
    requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove',function(e){
    var rect=canvas.getBoundingClientRect();
    paddle.x=e.clientX-rect.left-paddle.w/2;
    if(paddle.x<0)paddle.x=0;
    if(paddle.x+paddle.w>W)paddle.x=W-paddle.w;
});

canvas.addEventListener('click',function(){
    if(!alive){
        resetGame();
        launch();
    } else {
        launch();
    }
});

resetBall();draw();
</script>
</body>
</html>
