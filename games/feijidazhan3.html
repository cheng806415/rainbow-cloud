<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>飞机大战</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
}
#game {
    border: 2px solid #0f0;
    background: #000;
    max-width: 100%;
    max-height: 100vh;
    touch-action: none;
}
</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
<canvas id="game" width="320" height="480"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

function resizeCanvas() {
    const maxWidth = window.innerWidth - 10;
    const maxHeight = window.innerHeight - 10;
    const scale = Math.min(maxWidth / 320, maxHeight / 480);
    canvas.style.width = `${320 * scale}px`;
    canvas.style.height = `${480 * scale}px`;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let plane = {
    x: 160,
    y: 400,
    w: 40,
    h: 40,
    speed: 4
};

let bullets = [];
let enemies = [];
let explosions = [];
let stars = [];
let items = [];
let bossBullets = [];

let score = 0;
let hp = 3;
let gameOver = false;
let isPause = false;
let maxBullet = 8;
let buffType = 0;
let buffTime = 0;

let shipStrong = 0;
let bulletDmg = 1;
let baseMaxBullet = 8;

let talentBranch = 0;
let atkLv = 0;
let defLv = 0;
let balLv = 0;

let pointerX = 0;
let pointerY = 0;
let isPointerDown = false;

let level = 1;
let enemyInterval = 800;
let enemyTimer = null;

let boss = null;
let bossComeAnim = false;
let bossComeY = -80;
let bossInvincible = false;
let bossInvincibleTime = 180;
let bossShootCd = 0;
let bossNeedDie = false;

let key = {};
let shootCd = 0;
let restartCooldown = false;
let lastLevelScore = 0;

document.addEventListener("keydown", e => {
    key[e.keyCode] = true;
    if(e.keyCode === 27 && !gameOver && talentBranch !== 0){
        isPause = !isPause;
    }
    if(e.keyCode === 32 && gameOver && !restartCooldown){
        restartCooldown = true;
        restartGame();
        setTimeout(() => { restartCooldown = false; }, 500);
    }
});
document.addEventListener("keyup", e => key[e.keyCode] = false);

canvas.addEventListener('pointerdown', e => {
    isPointerDown = true;
    updatePointerPos(e);
    if(talentBranch === 0) handleTalentClick();
    if(gameOver && !restartCooldown){
        restartCooldown = true;
        restartGame();
        setTimeout(() => { restartCooldown = false; }, 500);
    }
});
canvas.addEventListener('pointermove', e => {
    if(isPointerDown) updatePointerPos(e);
});
canvas.addEventListener('pointerup', () => {
    isPointerDown = false;
});
canvas.addEventListener('pointerleave', () => {
    isPointerDown = false;
});

function updatePointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    pointerX = (e.clientX - rect.left) * scaleX;
    pointerY = (e.clientY - rect.top) * scaleY;
}

function handleTalentClick() {
    if(pointerX >=25 && pointerX <=105 && pointerY >=140 && pointerY <=270){
        talentBranch = 1;
    }else if(pointerX >=120 && pointerX <=200 && pointerY >=140 && pointerY <=270){
        talentBranch = 2;
    }else if(pointerX >=215 && pointerX <=295 && pointerY >=140 && pointerY <=270){
        talentBranch = 3;
    }
}

function initStars(){
    stars = [];
    for(let i = 0; i < 40; i++){
        stars.push({
            x: Math.random() * 320,
            y: Math.random() * 480,
            r: Math.random() * 1.5 + 0.5,
            speed: Math.random() * 1.2 + 0.3
        });
    }
}
initStars();

function startEnemyTimer(){
    if(enemyTimer) clearInterval(enemyTimer);
    enemyTimer = setInterval(createEnemy, enemyInterval);
}

function createEnemy(){
    if(gameOver) return;
    if(boss) return;
    let type = Math.floor(Math.random() * 4);
    let e = {};
    if(type === 0){
        e.x = Math.random() * 280;
        e.y = -50;
        e.w = 35; e.h = 35;
        e.speed = 2; e.hp = 1; e.score = 10; e.type = 0;
    }else if(type === 1){
        e.x = Math.random() * 280;
        e.y = -50;
        e.w = 30; e.h = 30;
        e.speed = 4; e.hp = 1; e.score = 15; e.type = 1;
    }else if(type === 2){
        e.x = Math.random() * 250;
        e.y = -60;
        e.w = 60; e.h = 60;
        e.speed = 1.2; e.hp = 3; e.score = 30; e.type = 2;
    }else{
        e.x = Math.random() * 280;
        e.y = -50;
        e.w = 38; e.h = 38;
        e.speed = 2.5; e.hp = 2; e.score = 20; e.type = 3;
    }
    enemies.push(e);
}

function createBoss(){
    boss = {
        x: 60,
        y: -80,
        w: 200,
        h: 80,
        hp: 120 + level * 8,
        maxHp: 120 + level * 8,
        speed: 1.2
    };
    bossComeAnim = true;
    bossComeY = -80;
    bossInvincible = true;
    bossInvincibleTime = 180;
    bossShootCd = 0;
    bossBullets = [];
    bossNeedDie = false;
}

function bossShoot(){
    bossBullets.push({
        x: boss.x + boss.w / 2 - 4,
        y: boss.y + boss.h,
        speed: 3
    });
}

function createItem(){
    if(gameOver) return;
    if(Math.random() > 0.3) return;
    items.push({
        x: Math.random() * 280,
        y: -30,
        w: 25,
        h: 25,
        speed: 1.5
    });
}

function shoot(){
    if(gameOver) return;
    if(isPause) return;
    if(shootCd > 0){
        shootCd--;
        return;
    }
    if(bullets.length >= maxBullet) return;
    shootCd = 8;
    if(buffType === 1){
        bullets.push({x: plane.x + 5, y: plane.y - 10, speed:5});
        bullets.push({x: plane.x + 31, y: plane.y - 10, speed:5});
    }else{
        bullets.push({x: plane.x + 18, y: plane.y - 10, speed:5});
    }
}

function restartGame(){
    score = 0;
    hp = 3;
    level = 1;
    gameOver = false;
    isPause = false;
    buffType = 0;
    buffTime = 0;
    talentBranch = 0;
    atkLv = defLv = balLv = 0;
    shipStrong = 0;
    bulletDmg = 1;
    maxBullet = baseMaxBullet;
    enemyInterval = 800;
    shootCd = 0;
    lastLevelScore = 0;

    plane.x = 160;
    plane.y = 400;
    bullets = [];
    enemies = [];
    explosions = [];
    items = [];
    boss = null;
    bossComeAnim = false;
    bossInvincible = false;
    bossInvincibleTime = 0;
    bossBullets = [];
    bossNeedDie = false;

    initStars();
    startEnemyTimer();
}

function handleBossDeath(){
    bossBullets = [];
    for(let n=0;n<8;n++){
        explosions.push({
            x: Math.random()*240,
            y: Math.random()*300,
            size:20,maxSize:60,life:15
        });
    }
    boss = null;
    bossNeedDie = false;
    startEnemyTimer();
}

function rectCollision(ax,ay,aw,ah,bx,by,bw,bh){
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function game(){
    if(talentBranch === 0){
        ctx.fillStyle = "#0a0a1a";
        ctx.fillRect(0,0,320,480);
        ctx.fillStyle = "#fff";
        ctx.font = "34px 微软雅黑";
        ctx.textAlign = "center";
        ctx.fillText("选择初始天赋",160,70);
        ctx.font = "16px 微软雅黑";
        ctx.fillStyle = "#888";
        ctx.fillText("点击或按键选择",160,100);

        let c1Color = (pointerX>=25&&pointerX<=105&&pointerY>=140&&pointerY<=270) ? "#bb3333":"#992222";
        ctx.fillStyle = c1Color;
        ctx.fillRect(25,140,80,130);
        ctx.strokeStyle = "#ff5555";
        ctx.lineWidth = 2;
        ctx.strokeRect(25,140,80,130);
        ctx.fillStyle = "#fff";
        ctx.font = "20px 微软雅黑";
        ctx.fillText("攻击流",65,190);
        ctx.font = "14px 微软雅黑";
        ctx.fillStyle = "#ddd";
        ctx.fillText("伤害\u2191",65,220);
        ctx.fillText("子弹上限\u2191",65,245);
        ctx.fillText("生存较弱",65,270);

        let c2Color = (pointerX>=120&&pointerX<=200&&pointerY>=140&&pointerY<=270) ? "#3333bb":"#222299";
        ctx.fillStyle = c2Color;
        ctx.fillRect(120,140,80,130);
        ctx.strokeStyle = "#5555ff";
        ctx.strokeRect(120,140,80,130);
        ctx.fillStyle = "#fff";
        ctx.font = "20px 微软雅黑";
        ctx.fillText("防御流",160,190);
        ctx.font = "14px 微软雅黑";
        ctx.fillStyle = "#ddd";
        ctx.fillText("护盾持久\u2191",160,220);
        ctx.fillText("回血效果\u2191",160,245);
        ctx.fillText("伤害偏低",160,270);

        let c3Color = (pointerX>=215&&pointerX<=295&&pointerY>=140&&pointerY<=270) ? "#339933":"#228822";
        ctx.fillStyle = c3Color;
        ctx.fillRect(215,140,80,130);
        ctx.strokeStyle = "#55ff55";
        ctx.strokeRect(215,140,80,130);
        ctx.fillStyle = "#fff";
        ctx.font = "20px 微软雅黑";
        ctx.fillText("均衡流",255,190);
        ctx.font = "14px 微软雅黑";
        ctx.fillStyle = "#ddd";
        ctx.fillText("全属性小幅\u2191",255,220);
        ctx.fillText("无明显短板",255,245);
        ctx.fillText("平稳成长",255,270);

        if(key[49]) talentBranch = 1;
        if(key[50]) talentBranch = 2;
        if(key[51]) talentBranch = 3;

        ctx.textAlign = "left";
        requestAnimationFrame(game);
        return;
    }

    if(isPause){
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,320,480);
        ctx.fillStyle = "#fff";
        ctx.font = "40px 微软雅黑";
        ctx.textAlign = "center";
        ctx.fillText("游戏暂停",160,220);
        ctx.font = "22px 微软雅黑";
        ctx.fillText("按 ESC 继续",160,280);
        ctx.textAlign = "left";
        requestAnimationFrame(game);
        return;
    }

    ctx.clearRect(0,0,320,480);

    ctx.fillStyle = "#fff";
    for(let i=0;i<stars.length;i++){
        let s = stars[i];
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
        s.y += s.speed;
        if(s.y>480){
            s.y = 0;
            s.x = Math.random()*320;
        }
    }

    if(isPointerDown && !gameOver){
        plane.x += (pointerX - plane.x - plane.w/2) * 0.15;
        plane.y += (pointerY - plane.y - plane.h/2) * 0.15;
        shoot();
    }else{
        if(key[37]) plane.x -= plane.speed;
        if(key[39]) plane.x += plane.speed;
        if(key[38]) plane.y -= plane.speed;
        if(key[40]) plane.y += plane.speed;
        if(key[32]) shoot();
    }

    if(plane.x < 0) plane.x = 0;
    if(plane.x > 320 - plane.w) plane.x = 320 - plane.w;
    if(plane.y < 0) plane.y = 0;
    if(plane.y > 480 - plane.h) plane.y = 480 - plane.h;

    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.moveTo(plane.x + plane.w/2, plane.y);
    ctx.lineTo(plane.x, plane.y + plane.h);
    ctx.lineTo(plane.x + plane.w, plane.y + plane.h);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#ff9900";
    ctx.beginPath();
    ctx.moveTo(plane.x + plane.w*0.3, plane.y + plane.h);
    ctx.lineTo(plane.x + plane.w/2, plane.y + plane.h + 8);
    ctx.lineTo(plane.x + plane.w*0.7, plane.y + plane.h);
    ctx.closePath();
    ctx.fill();

    if(buffType === 2){
        ctx.strokeStyle = "#ffff00";
        ctx.lineWidth = 3;
        ctx.strokeRect(plane.x - 3, plane.y - 3, plane.w + 6, plane.h + 6);
    }

    for(let i=bullets.length-1;i>=0;i--){
        let b = bullets[i];
        b.y -= b.speed;
        ctx.fillStyle = "#00ffff";
        ctx.fillRect(b.x,b.y,3,18);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x,b.y,3,18);
        if(b.y < -20) bullets.splice(i,1);
    }

    for(let i=enemies.length-1;i>=0;i--){
        let e = enemies[i];
        e.y += e.speed;
        if(e.type === 3){
            let dx = Math.abs((e.x+e.w/2)-(plane.x+plane.w/2));
            if(dx < 120) e.y += 0.8;
        }

        if(e.type === 0) ctx.fillStyle = "#ff3333";
        else if(e.type === 1) ctx.fillStyle = "#33ff33";
        else if(e.type === 2) ctx.fillStyle = "#aa33ff";
        else ctx.fillStyle = "#ffaa00";

        ctx.beginPath();
        ctx.moveTo(e.x + e.w/2, e.y + e.h);
        ctx.lineTo(e.x, e.y);
        ctx.lineTo(e.x + e.w, e.y);
        ctx.closePath();
        ctx.fill();

        for(let j=bullets.length-1;j>=0;j--){
            let b = bullets[j];
            if(b.x+3 > e.x && b.x < e.x+e.w && b.y+18 > e.y && b.y < e.y+e.h){
                e.hp -= bulletDmg;
                bullets.splice(j,1);
                if(e.hp <= 0){
                    score += e.score;
                    explosions.push({x:e.x,y:e.y,size:20,maxSize:50,life:15});
                    createItem();
                    enemies.splice(i,1);
                }
                break;
            }
        }

        if(enemies[i] && rectCollision(plane.x,plane.y,plane.w,plane.h,enemies[i].x,enemies[i].y,enemies[i].w,enemies[i].h)){
            enemies.splice(i,1);
            if(buffType !== 2){
                hp--;
                if(hp <= 0) gameOver = true;
            }
            continue;
        }

        if(e.y>500) enemies.splice(i,1);
    }

    if(boss && !bossNeedDie){
        if(bossInvincibleTime > 0){
            bossInvincibleTime--;
            if(bossInvincibleTime <= 0) bossInvincible = false;
        }

        if(bossComeAnim){
            bossComeY += 1.5;
            boss.y = bossComeY;
            if(bossComeY >= 60) bossComeAnim = false;
        }else{
            if(plane.x < 160) boss.x += boss.speed;
            if(plane.x > 160) boss.x -= boss.speed;
            if(boss.x < 0) boss.x = 0;
            if(boss.x > 320 - boss.w) boss.x = 320 - boss.w;
        }

        if(bossShootCd > 0) bossShootCd--;
        if(!bossInvincible && bossShootCd <= 0){
            bossShoot();
            bossShootCd = 40;
        }

        ctx.globalAlpha = bossInvincible ? 0.5 : 1;
        ctx.fillStyle = "#ff2222";
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.strokeStyle = "#ff8888";
        ctx.lineWidth = 3;
        ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
        ctx.globalAlpha = 1;

        let hpRate = boss.hp / boss.maxHp;
        ctx.fillStyle = "#333";
        ctx.fillRect(20,150,280,15);
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(20,150,280 * hpRate,15);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1;
        ctx.strokeRect(20,150,280,15);

        if(bossInvincible){
            ctx.fillStyle = "#ffdd00";
            ctx.font = "22px 微软雅黑";
            ctx.textAlign = "center";
            ctx.fillText("BOSS无敌中",160,190);
            ctx.textAlign = "left";
        }

        if(!bossInvincible && !bossNeedDie){
            for(let j=bullets.length-1;j>=0;j--){
                let b = bullets[j];
                if(b.x+3 > boss.x && b.x < boss.x+boss.w && b.y+18 > boss.y && b.y < boss.y+boss.h){
                    boss.hp -= bulletDmg;
                    bullets.splice(j,1);
                    if(boss.hp <= 0){
                        bossNeedDie = true;
                        boss.hp = 0;
                        break;
                    }
                }
            }
        }

        for(let i=bossBullets.length-1;i>=0;i--){
            let bb = bossBullets[i];
            bb.y += bb.speed;
            ctx.fillStyle = "#ff5555";
            ctx.fillRect(bb.x, bb.y, 8, 16);
            if(rectCollision(plane.x,plane.y,plane.w,plane.h,bb.x,bb.y,8,16)){
                if(buffType !== 2){
                    hp--;
                    if(hp <= 0) gameOver = true;
                }
                bossBullets.splice(i,1);
            }
            if(bb.y > 480) bossBullets.splice(i,1);
        }

        if(rectCollision(plane.x,plane.y,plane.w,plane.h,boss.x,boss.y,boss.w,boss.h)){
            if(buffType !== 2){
                hp -= 2;
                if(hp <= 0) gameOver = true;
            }
        }
    }

    if(bossNeedDie && boss){
        handleBossDeath();
    }

    for(let k=explosions.length-1;k>=0;k--){
        let exp = explosions[k];
        exp.size += 2;
        exp.life--;
        let alpha = exp.life / 15;
        ctx.fillStyle = `rgba(255,200,0,${alpha})`;
        ctx.beginPath();
        ctx.arc(exp.x+20, exp.y+20, exp.size, 0, Math.PI*2);
        ctx.fill();
        if(exp.life <= 0) explosions.splice(k,1);
    }

    ctx.fillStyle = "#0f0";
    for(let i=items.length-1;i>=0;i--){
        let it = items[i];
        it.y += it.speed;
        ctx.fillRect(it.x,it.y,it.w,it.h);
        if(rectCollision(plane.x,plane.y,plane.w,plane.h,it.x,it.y,it.w,it.h)){
            if(hp < 3) hp++;
            items.splice(i,1);
        }
        if(it.y>480) items.splice(i,1);
    }

    if(buffTime > 0){
        buffTime--;
        if(buffTime <= 0) buffType = 0;
    }

    if(score >= level * 200 && score > lastLevelScore){
        lastLevelScore = score;
        level++;
        enemyInterval -= 30;
        if(enemyInterval < 400) enemyInterval = 400;
        startEnemyTimer();

        let ran = Math.random();
        buffType = ran < 0.5 ? 1 : 2;
        buffTime = 400;

        if(level % 5 === 0){
            if(talentBranch === 1){
                atkLv++;
                bulletDmg += 0.5;
                maxBullet += 1;
            }else if(talentBranch === 2){
                defLv++;
                plane.speed += 0.15;
            }else if(talentBranch === 3){
                balLv++;
                bulletDmg += 0.25;
                maxBullet += 0.5;
                plane.speed += 0.1;
            }
        }

        if(level % 30 === 0 && !boss){
            createBoss();
        }
    }

    ctx.fillStyle = "#fff";
    ctx.font = "20px 微软雅黑";
    ctx.fillText("分数："+score,10,30);
    ctx.fillText("血量："+hp,10,60);
    ctx.fillText("等级："+level,10,90);

    if(buffTime > 0){
        ctx.font = "20px 微软雅黑";
        if(buffType === 1){
            ctx.fillStyle = "#00ff00";
            ctx.fillText("双发子弹 剩余："+Math.ceil(buffTime/60)+"秒",10,120);
        }else if(buffType === 2){
            ctx.fillStyle = "#ffff00";
            ctx.fillText("无敌护盾 剩余："+Math.ceil(buffTime/60)+"秒",10,120);
        }
    }

    if(gameOver){
        ctx.fillStyle = "#ff3333";
        ctx.font = "42px 微软雅黑";
        ctx.textAlign = "center";
        ctx.fillText("游戏结束",160,200);
        ctx.fillStyle = "#fff";
        ctx.font = "22px 微软雅黑";
        ctx.fillText("点击屏幕 重新开始",160,270);
        ctx.textAlign = "left";
    }

    requestAnimationFrame(game);
}

startEnemyTimer();
game();
</script>
</body>
</html>
